    <!-- GDPR Cookie Consent Banner -->
    <div id="cookie-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#ffffff;border-top:1px solid #e5e7eb;box-shadow:0 -4px 16px rgba(0,0,0,0.08);padding:14px 24px;z-index:99999;font-family:sans-serif;">
      <div style="max-width:1280px;margin:0 auto;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;">
        <p style="margin:0;font-size:12px;color:#4b5563;flex:1;min-width:200px;line-height:1.6;">
          We use cookies to improve your experience, analyze site traffic, and serve personalized content.
          By clicking <strong>"Accept"</strong>, you consent to our use of cookies.
          See our <a href="https://www.scriptiq.site/privacy" style="color:#4F46E5;text-decoration:underline;">Privacy Policy</a> for details.
        </p>
        <div style="display:flex;gap:8px;flex-shrink:0;">
          <button onclick="cookieDecline()" style="font-size:12px;font-weight:600;padding:6px 14px;border-radius:6px;border:1px solid #e5e7eb;background:#ffffff;color:#4b5563;cursor:pointer;">Decline</button>
          <button onclick="cookieAccept()" style="font-size:12px;font-weight:600;padding:6px 16px;border-radius:6px;border:none;background:#4F46E5;color:#ffffff;cursor:pointer;">Accept</button>
        </div>
      </div>
    </div>

    <script>
      (function() {
        if (!localStorage.getItem('cookie_consent')) {
          setTimeout(function() {
            document.getElementById('cookie-banner').style.display = 'block';
          }, 500);
        }
      })();
      function cookieAccept() {
        localStorage.setItem('cookie_consent', 'accepted');
        document.getElementById('cookie-banner').style.display = 'none';
      }
      function cookieDecline() {
        localStorage.setItem('cookie_consent', 'declined');
        document.getElementById('cookie-banner').style.display = 'none';
      }
    </script>
